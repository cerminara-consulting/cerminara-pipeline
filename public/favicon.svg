<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Classic Mac "Happy Mac" inspired mark, simplified.
       White chassis, ink strokes. Reads as a stylized monitor with a checkmark
       (the tracker ships, the pipeline moves). -->
  <rect x="0" y="0" width="16" height="16" fill="#e8e6dc"/>
  <!-- monitor frame -->
  <rect x="2" y="2" width="12" height="9" fill="#e8e6dc" stroke="#1a1a1a" stroke-width="1"/>
  <!-- screen dither (top stripe) -->
  <rect x="3" y="3" width="10" height="1" fill="#1a1a1a"/>
  <!-- checkmark in screen -->
  <path d="M4.5 6.5 L6.5 8.5 L11 4" fill="none" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="square"/>
  <!-- monitor base -->
  <rect x="6" y="11" width="4" height="1" fill="#1a1a1a"/>
  <rect x="3" y="12" width="10" height="1" fill="#1a1a1a"/>
</svg>